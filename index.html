<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니 스프레드시트 앱</title>
    <link rel="stylesheet" href="style.css">
    <!-- Excel Export를 위한 SheetJS 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- 상단 헤더 영역 (좌표 표시 및 내보내기 버튼) -->
        <header class="app-header">
            <div id="current-cell-id" class="focus-box">Cell: None</div>
            <button id="export-btn" class="export-button">Excel Export</button>
        </header>

        <!-- 스프레드시트 그리드가 동적으로 생성될 영역 -->
        <main class="spreadsheet-container">
            <div id="grid" class="grid-table"></div>
        </main>
    </div>

    <!-- 비즈니스 로직 스크립트 연결 -->
    <script src="app.js"></script>
</body>
</html>
